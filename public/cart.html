<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - TillValle</title>
  <link rel="icon" href="logo.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="global-chat.css">
  <script src="maintenance.js"></script>
  <style>
    :root {
      --primary: #2d6a4f;
      --primary-light: #40916c;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%);
      min-height: 100vh;
      color: var(--text-primary);
    }

    .page-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Page Title */
    .page-title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title-bar h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Cart Layout */
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    /* Glass card */
    .glass-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.75) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 8px 32px rgba(45,106,79,0.10);
      overflow: hidden;
      position: relative;
    }
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
    }

    .card-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .card-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* Cart Items */
    #cart-items {
      list-style: none;
      padding: 0;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      transition: background 0.2s ease;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item:hover { background: rgba(45,106,79,0.02); }

    .item-emoji {
      font-size: 2rem;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .item-details { flex: 1; }
    .item-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 3px;
    }
    .item-unit-price {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .item-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 2px solid rgba(45,106,79,0.2);
      background: white;
      color: var(--primary);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .qty-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .qty-display {
      width: 36px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .item-price {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--primary);
      min-width: 80px;
      text-align: right;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .remove-btn:hover { background: #fee2e2; }

    /* Empty cart */
    .empty-cart {
      text-align: center;
      padding: 60px 24px;
    }
    .empty-cart-icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-cart h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .empty-cart p {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    /* Order Summary */
    .summary-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.92), rgba(255,255,255,0.75));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 28px 24px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 8px 32px rgba(45,106,79,0.10);
      position: sticky;
      top: 24px;
    }
    .summary-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .summary-row.total {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary);
      border-top: 2px solid rgba(45,106,79,0.1);
      margin-top: 8px;
      padding-top: 14px;
    }

    .btn-checkout {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(45,106,79,0.3);
      margin-top: 20px;
    }
    .btn-checkout:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(45,106,79,0.4);
    }
    .btn-checkout:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-continue {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--primary);
      border: 2px solid rgba(45,106,79,0.2);
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      margin-top: 10px;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .btn-continue:hover {
      background: rgba(45,106,79,0.06);
      border-color: var(--primary);
    }

    /* Promo badge */
    .promo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.82rem;
      color: #065f46;
      font-weight: 600;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: white;
      padding: 14px 24px;
      border-radius: 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 9999;
      font-size: 0.9rem;
      font-weight: 600;
      animation: toastIn 0.3s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      font-size: 0.88rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .summary-card { position: static; }
      .page-wrapper { padding: 20px 16px 60px; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-wrapper">
    <div class="page-title-bar">
      <h1>🛒 Shopping Cart</h1>
      <span id="cart-count-badge" style="font-size:0.9rem;color:var(--text-secondary);font-weight:500;"></span>
    </div>

    <div class="cart-layout">
      <!-- Cart Items -->
      <div class="glass-card">
        <div class="card-header">
          <h2>Cart Items</h2>
        </div>
        <ul id="cart-items"></ul>
      </div>

      <!-- Order Summary -->
      <div class="summary-card">
        <div class="summary-title">📋 Order Summary</div>

        <div class="promo-badge">
          🌱 Fresh organic produce — farm to table!
        </div>

        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">KES 0</span>
        </div>
        <div class="summary-row">
          <span>Delivery</span>
          <span style="color:#16a34a;font-weight:600;">Free</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="cart-total">KES 0</span>
        </div>

        <button class="btn-checkout" id="checkout-btn">
          🚀 Proceed to Checkout
        </button>
        <a href="shop.html" class="btn-continue">← Continue Shopping</a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 TillValle. All rights reserved. | Fresh from farm to table 🌱</p>
  </footer>

  <script>
    fetch('navbar.html')
      .then(r => r.text())
      .then(html => { document.getElementById('navbar-container').innerHTML = html; })
      .catch(() => {});

    const PRODUCT_EMOJIS = {
      'avocado': '🥑', 'mango': '🥭', 'spinach': '🥬', 'kale': '🥬',
      'tomato': '🍅', 'banana': '🍌', 'apple': '🍎', 'orange': '🍊',
      'lemon': '🍋', 'watermelon': '🍉', 'pawpaw': '🍈', 'milk': '🥛',
      'egg': '🥚', 'honey': '🍯', 'butter': '🧈', 'ghee': '🫙',
      'default': '🌿'
    };

    function getEmoji(name) {
      const lower = (name || '').toLowerCase();
      for (const [key, emoji] of Object.entries(PRODUCT_EMOJIS)) {
        if (lower.includes(key)) return emoji;
      }
      return PRODUCT_EMOJIS.default;
    }

    function showToast(msg) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function renderCart() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const cartItemsEl = document.getElementById('cart-items');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl = document.getElementById('cart-total');
      const badgeEl = document.getElementById('cart-count-badge');
      const checkoutBtn = document.getElementById('checkout-btn');

      cartItemsEl.innerHTML = '';
      let total = 0;
      let totalQty = 0;

      if (cart.length === 0) {
        cartItemsEl.innerHTML = `
          <li class="empty-cart">
            <div class="empty-cart-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Add some fresh produce to get started!</p>
            <a href="shop.html" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,#2d6a4f,#40916c);color:white;border-radius:12px;text-decoration:none;font-weight:600;font-size:0.9rem;">🛍️ Browse Products</a>
          </li>
        `;
        checkoutBtn.disabled = true;
        badgeEl.textContent = '0 items';
      } else {
        cart.forEach((item, index) => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          totalQty += item.quantity;

          const li = document.createElement('li');
          li.className = 'cart-item';
          li.innerHTML = `
            <div class="item-emoji">${getEmoji(item.name)}</div>
            <div class="item-details">
              <div class="item-name">${item.name}</div>
              <div class="item-unit-price">KES ${item.price.toLocaleString()} each</div>
            </div>
            <div class="item-controls">
              <button class="qty-btn" onclick="updateQty(${index}, -1)">−</button>
              <span class="qty-display">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
            </div>
            <div class="item-price">KES ${itemTotal.toLocaleString()}</div>
            <button class="remove-btn" onclick="removeItem(${index})" title="Remove">🗑️</button>
          `;
          cartItemsEl.appendChild(li);
        });
        checkoutBtn.disabled = false;
        badgeEl.textContent = `${totalQty} item${totalQty !== 1 ? 's' : ''}`;
      }

      subtotalEl.textContent = `KES ${total.toLocaleString()}`;
      totalEl.textContent = `KES ${total.toLocaleString()}`;
    }

    window.updateQty = function(index, change) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart[index].quantity += change;
      if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
        showToast('Item removed from cart');
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    };

    window.removeItem = function(index) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const name = cart[index].name;
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      showToast(`${name} removed from cart`);
      renderCart();
    };

    document.getElementById('checkout-btn').addEventListener('click', () => {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      if (cart.length === 0) {
        showToast('Your cart is empty!');
        return;
      }
      window.location.href = 'location.html';
    });

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
  <script src="global-chat.js"></script>
  <script src="bg-init.js"></script>
</body>
</html>
