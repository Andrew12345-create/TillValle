<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TilleValle App</title>
  <link rel="icon" href="logo.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstachgoogleapis.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 20px;
      padding: 35px 25px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-section img {
      height: 50px;
      width: auto;
      margin-bottom: 15px;
    }

    .logo-section h1 {
      font-size: 24px;
      color: #2d6a4f;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .logo-section p {
      font-size: 14px;
      color: #666;
    }

    h2 {
      text-align: center;
      font-size: 20px;
      color: #2d6a4f;
      margin-bottom: 25px;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: #2d6a4f;
      box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
    }

    .password-container {
      position: relative;
      margin-bottom: 18px;
    }

    .password-container input {
      padding-right: 45px;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #2d6a4f;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 5px;
      transition: opacity 0.2s;
    }

    .toggle-password:hover {
      opacity: 0.7;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%);
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-bottom: 15px;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(45, 106, 79, 0.3);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #999;
      font-size: 14px;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #e0e0e0;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .google-signin {
      margin-bottom: 20px;
    }

    .links-section {
      text-align: center;
      margin-top: 20px;
    }

    .links-section a {
      display: block;
      color: #2d6a4f;
      text-decoration: none;
      font-size: 14px;
      margin: 10px 0;
      transition: opacity 0.2s;
      font-weight: 500;
    }

    .links-section a:hover {
      opacity: 0.7;
    }

    #output {
      margin-top: 15px;
      padding: 12px 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
      display: none;
    }

    #output.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    #output.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      margin-bottom: 20px;
      color: #2d6a4f;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    .back-link::before {
      content: '← ';
      margin-right: 5px;
    }

    .version-badge {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(45, 106, 79, 0.8);
      color: white;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      z-index: 100;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 25px 20px;
        border-radius: 15px;
      }

      h2 {
        font-size: 18px;
      }

      input[type="email"],
      input[type="password"],
      input[type="text"] {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <a href="app.html" class="back-link">Back</a>
    
    <div class="logo-section">
      <img src="logo.jpg" alt="TilleValle Logo">
      <h1>TilleValle</h1>
      <p>Fresh Farm Produce</p>
    </div>

    <h2>Login to Your Account</h2>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="password-container form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <button type="button" class="toggle-password" id="toggle-password">Show</button>
      </div>

      <button type="submit">Login</button>
    </form>

    <div id="output"></div>

    <div class="divider">OR</div>

    <div class="google-signin">
      <div id="g_id_onload"
           data-client_id="239408882803-mstdl0a10q9f0u43h9171kqqg58hoc3b.apps.googleusercontent.com"
           data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left" style="display: flex; justify-content: center;"></div>
    </div>

    <div class="links-section">
      <a href="app-forgot-password.html">Forgot Password?</a>
      <a href="app-signup.html">Don't have an account? Sign up</a>
    </div>
  </div>

  <script>
    // Login form handling
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showOutput('Please fill in all fields', 'error');
        return;
      }

      // Determine login URL based on environment
      const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const loginUrl = isLocal ? 'http://localhost:3001/login' : '/.netlify/functions/login';

      try {
        const response = await fetch(loginUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (data.ok) {
          // Successful login
          localStorage.setItem('token', data.token);
          localStorage.setItem('email', email);
          showOutput('Login successful! Redirecting...', 'success');

          // Check if admin user
          if (email === 'andrewmunamwangi@gmail.com') {
            setTimeout(() => {
              window.location.href = 'admin.html';
            }, 1500);
          } else {
            setTimeout(() => {
              window.location.href = 'app-shop.html';
            }, 1500);
          }
        } else {
          showOutput(data.error || 'Login failed. Please try again.', 'error');
        }
      } catch (error) {
        showOutput('Network error. Please check if the server is running.', 'error');
        console.error('Login error:', error);
      }
    });

    // Toggle password visibility
    document.getElementById('toggle-password').addEventListener('click', function(e) {
      e.preventDefault();
      const passwordInput = document.getElementById('password');
      const toggleBtn = this;
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.textContent = 'Hide';
      } else {
        passwordInput.type = 'password';
        toggleBtn.textContent = 'Show';
      }
    });

    // Google Sign-In callback
    window.handleCredentialResponse = async function(response) {
      // Decode the JWT token to get user info
      const responsePayload = decodeJwtResponse(response.credential);
      
      // Save to database
      try {
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const signupUrl = isLocal ? 'http://localhost:3001/signup' : '/.netlify/functions/signup';
        
        await fetch(signupUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email: responsePayload.email,
            password: 'google_oauth_' + responsePayload.sub,
            name: responsePayload.name,
            google_login: true
          }),
        });
      } catch (error) {
        console.log('User may already exist in database:', error);
      }
      
      // Store user info
      localStorage.setItem('email', responsePayload.email);
      localStorage.setItem('token', response.credential);
      localStorage.setItem(`profileName_${responsePayload.email}`, responsePayload.name);
      if (responsePayload.picture) {
        localStorage.setItem(`profilePicture_${responsePayload.email}`, responsePayload.picture);
      }
      
      showOutput('Google login successful! Redirecting...', 'success');
      
      // Check if admin user
      if (responsePayload.email === 'andrewmunamwangi@gmail.com') {
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 1500);
      } else {
        setTimeout(() => {
          window.location.href = 'app-shop.html';
        }, 1500);
      }
    };

    // Function to decode JWT token
    function decodeJwtResponse(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }

    // Output helper
    function showOutput(message, type) {
      const output = document.getElementById('output');
      output.textContent = message;
      output.className = type;
    }
  </script>

  <!-- Version Badge -->
  <div class="version-badge">
    <span id="app-version">v1.0.0</span>
  </div>

  <!-- Load app version -->
  <script src="app-version.js"></script>
</body>
</html>
