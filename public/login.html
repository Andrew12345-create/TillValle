<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TillValle</title>
  <link rel="icon" href="logo.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="maintenance.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #2d6a4f 0%, #40916c 50%, #52b788 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background decorations */
    body::before {
      content: '';
      position: fixed;
      top: -20%; right: -10%;
      width: 500px; height: 500px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%; left: -10%;
      width: 400px; height: 400px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Top nav bar */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      background: rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .top-bar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
    }
    .top-bar-logo img {
      width: 32px; height: 32px;
      border-radius: 8px;
      object-fit: cover;
    }
    .top-bar-logo span {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .top-bar-link {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .top-bar-link:hover { color: white; }

    /* Login Card */
    .login-card {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.97);
      border-radius: 28px;
      padding: 44px 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.3);
      animation: slideUp 0.5s ease-out;
      position: relative;
      z-index: 10;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo section */
    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-section img {
      width: 64px; height: 64px;
      border-radius: 16px;
      object-fit: cover;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(45,106,79,0.25);
    }
    .logo-section h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #2d6a4f;
      margin-bottom: 6px;
    }
    .logo-section p {
      font-size: 0.88rem;
      color: #64748b;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0f172a;
      background: #f9fafb;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #2d6a4f;
      box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
      background: white;
    }
    .form-input::placeholder { color: #9ca3af; }

    /* Password field */
    .password-wrap {
      position: relative;
    }
    .password-wrap .form-input {
      padding-right: 52px;
    }
    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #2d6a4f;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px;
      font-family: inherit;
    }
    .toggle-password:hover { opacity: 0.7; }

    /* Forgot password */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.82rem;
      color: #2d6a4f;
      text-decoration: none;
      margin-top: -10px;
      margin-bottom: 20px;
      font-weight: 500;
    }
    .forgot-link:hover { text-decoration: underline; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(45,106,79,0.3);
      margin-bottom: 20px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(45,106,79,0.4);
    }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }
    .divider span {
      font-size: 0.8rem;
      color: #9ca3af;
      font-weight: 500;
    }

    /* Google sign in */
    .google-btn-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    /* Output message */
    #output {
      text-align: center;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      min-height: 20px;
    }
    #output.success {
      background: #d1fae5;
      color: #065f46;
    }
    #output.error {
      background: #fee2e2;
      color: #991b1b;
    }

    /* Links */
    .auth-links {
      text-align: center;
      margin-top: 8px;
    }
    .auth-links a {
      color: #2d6a4f;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
    }
    .auth-links a:hover { text-decoration: underline; }
    .auth-links .separator {
      color: #d1d5db;
      margin: 0 8px;
    }

    /* Loading spinner in button */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="top-bar">
    <a href="index.html" class="top-bar-logo">
      <img src="logo.jpg" alt="TillValle">
      <span>TillValle</span>
    </a>
    <a href="signup.html" class="top-bar-link">Create Account →</a>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="logo-section">
      <img src="logo.jpg" alt="TillValle Logo">
      <h1>Welcome Back</h1>
      <p>Sign in to your TillValle account</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" id="toggle-password" class="toggle-password">Show</button>
        </div>
      </div>

      <a href="forgot-password.html" class="forgot-link">Forgot password?</a>

      <div id="output"></div>

      <button type="submit" class="btn-submit" id="login-btn">Sign In</button>
    </form>

    <div class="divider"><span>OR</span></div>

    <div class="google-btn-wrap">
      <div id="g_id_onload"
           data-client_id="239408882803-mstdl0a10q9f0u43h9171kqqg58hoc3b.apps.googleusercontent.com"
           data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="sign_in_with"
           data-shape="rectangular"
           data-logo_alignment="left">
      </div>
    </div>

    <div class="auth-links">
      <a href="signup.html">Don't have an account? Sign up</a>
    </div>
  </div>

  <script>
    // Toggle password visibility
    document.getElementById('toggle-password').addEventListener('click', function() {
      const input = document.getElementById('password');
      if (input.type === 'password') {
        input.type = 'text';
        this.textContent = 'Hide';
      } else {
        input.type = 'password';
        this.textContent = 'Show';
      }
    });

    // Login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const output = document.getElementById('output');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';
      output.className = '';
      output.textContent = '';

      const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const loginUrl = isLocal ? 'http://localhost:3000/login' : '/.netlify/functions/login';

      try {
        const response = await fetch(loginUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('email', email);
          // Store admin status if user has admin rights
          if (data.user && data.user.is_admin) {
            localStorage.setItem('isAdmin', 'true');
            localStorage.setItem('isSuperAdmin', data.user.is_superadmin ? 'true' : 'false');
          }
          output.className = 'success';
          output.textContent = '✓ Login successful! Redirecting...';
          setTimeout(() => {
            if (email === 'andrewmunamwangi@gmail.com' || (data.user && data.user.is_admin)) {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'shop.html';
            }
          }, 1200);
        } else {
          output.className = 'error';
          output.textContent = data.error || 'Login failed. Please check your credentials.';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (error) {
        output.className = 'error';
        output.textContent = 'Connection error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // Google Sign In handler
    function handleCredentialResponse(response) {
      const output = document.getElementById('output');
      try {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        localStorage.setItem('email', payload.email);
        localStorage.setItem('userName', payload.name);
        output.className = 'success';
        output.textContent = '✓ Google sign-in successful! Redirecting...';
        setTimeout(() => { window.location.href = 'shop.html'; }, 1200);
      } catch (e) {
        output.className = 'error';
        output.textContent = 'Google sign-in failed. Please try again.';
      }
    }
  </script>
</body>
</html>
