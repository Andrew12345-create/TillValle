<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order History - TillValle</title>
  <link rel="icon" href="logo.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="global-chat.css">
  <link rel="stylesheet" href="creative-backgrounds.css">
  <style>
    :root {
      --primary: #2d6a4f;
      --primary-dark: #1b4332;
      --primary-light: #40916c;
      --accent: #ff6b6b;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* Page wrapper */
    .page-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    /* Page Title Bar */
    .page-title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-title-bar h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 18px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(45,106,79,0.08), 0 0 0 1px rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.6);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(45,106,79,0.15);
    }

    .stat-number {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Order Group */
    .order-group {
      background: linear-gradient(145deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(45,106,79,0.08), 0 0 0 1px rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.6);
      position: relative;
      overflow: hidden;
    }

    .order-group::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
    }

    .order-group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .order-date {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--primary);
    }

    .order-day-total {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary);
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* Order Item */
    .order-item {
      background: rgba(255,255,255,0.6);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.5);
      transition: background 0.2s ease;
    }

    .order-item:last-child {
      margin-bottom: 0;
    }

    .order-item:hover {
      background: rgba(255,255,255,0.85);
    }

    .order-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .order-id {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary);
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      padding: 3px 10px;
      border-radius: 12px;
    }

    .order-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .order-product-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .order-product-row:last-of-type {
      border-bottom: none;
    }

    .product-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .product-name {
      font-size: 0.9rem;
      color: var(--text-primary);
      font-weight: 500;
    }

    .product-qty {
      font-size: 0.75rem;
      color: var(--text-secondary);
      background: #f1f5f9;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    .product-price {
      font-size: 0.9rem;
      color: var(--primary);
      font-weight: 600;
    }

    .order-total-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(0,0,0,0.06);
      gap: 8px;
    }

    .order-total-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .order-total-amount {
      font-size: 1rem;
      font-weight: 800;
      color: var(--primary);
    }

    /* Empty / Not logged in states */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(45,106,79,0.12);
      border: 1px solid rgba(255,255,255,0.6);
    }

    .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-title { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
    .empty-subtitle { color: var(--text-secondary); margin-bottom: 28px; font-size: 0.95rem; }

    /* Buttons */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(45,106,79,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(45,106,79,0.4);
    }

    .btn-danger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #ff6b6b, #ee5a52);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(255,107,107,0.3);
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255,107,107,0.4);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
      color: var(--primary);
      border: 2px solid rgba(45,106,79,0.2);
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-back:hover {
      background: rgba(45,106,79,0.06);
      border-color: var(--primary);
    }

    /* Footer actions */
    .footer-actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: white;
      padding: 14px 24px;
      border-radius: 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 9999;
      font-size: 0.9rem;
      font-weight: 600;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .page-wrapper { padding: 20px 16px 60px; }
      .page-title-bar h1 { font-size: 1.5rem; }
      .order-group { padding: 16px; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div id="navbar-container"></div>

  <div class="page-wrapper">
    <div id="order-history-content">
      <!-- Injected by JS -->
    </div>
  </div>

  <script src="global-chat.js"></script>
  <script src="bg-init.js"></script>

  <script>
    // Load navbar
    fetch('navbar.html')
      .then(r => r.text())
      .then(html => { document.getElementById('navbar-container').innerHTML = html; });

    // Translations
    const translations = {
      en: {
        orderHistory: "Order History",
        noOrders: "No Orders Yet",
        noOrdersSubtitle: "Start shopping to see your order history here!",
        totalSpent: "Total Spent",
        orders: "Orders",
        notLoggedIn: "Not Logged In",
        notLoggedSubtitle: "Sign in to view your order history",
        signIn: "Sign In",
        order: "Order",
        clearHistory: "Clear History"
      },
      sw: {
        orderHistory: "Historia ya Maagizo",
        noOrders: "Hakuna Maagizo",
        noOrdersSubtitle: "Anza kununua ili kuona historia ya maagizo hapa!",
        totalSpent: "Jumla ya Matumizi",
        orders: "Maagizo",
        notLoggedIn: "Hujajisajili",
        notLoggedSubtitle: "Jisajili ili kuona historia ya maagizo yako",
        signIn: "Ingia",
        order: "Agizo",
        clearHistory: "Futa Historia"
      },
      fr: {
        orderHistory: "Historique des commandes",
        noOrders: "Aucune commande",
        noOrdersSubtitle: "Commencez vos achats pour voir votre historique ici!",
        totalSpent: "Total dépensé",
        orders: "Commandes",
        notLoggedIn: "Non connecté",
        notLoggedSubtitle: "Connectez-vous pour voir votre historique",
        signIn: "Se connecter",
        order: "Commande",
        clearHistory: "Effacer l'historique"
      },
      zh: {
        orderHistory: "订单历史",
        noOrders: "暂无订单",
        noOrdersSubtitle: "开始购物以在此处查看您的订单历史！",
        totalSpent: "总消费",
        orders: "订单",
        notLoggedIn: "未登录",
        notLoggedSubtitle: "登录以查看您的订单历史",
        signIn: "登录",
        order: "订单",
        clearHistory: "清除历史"
      }
    };

    let currentLang = 'en';

    function t(key) {
      return (translations[currentLang] && translations[currentLang][key]) || translations.en[key] || key;
    }

    function initPage() {
      currentLang = localStorage.getItem('selectedLanguage') || 'en';
      const userEmail = localStorage.getItem('email');
      const content = document.getElementById('order-history-content');

      if (!userEmail) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">👤</div>
            <div class="empty-title">${t('notLoggedIn')}</div>
            <div class="empty-subtitle">${t('notLoggedSubtitle')}</div>
            <a class="btn-primary" href="login.html">${t('signIn')}</a>
          </div>
        `;
        return;
      }

      const orderKey = 'orderHistory_' + userEmail;
      const orderHistory = JSON.parse(localStorage.getItem(orderKey) || '[]');

      if (orderHistory.length === 0) {
        content.innerHTML = `
          <div class="page-title-bar">
            <h1>${t('orderHistory')}</h1>
            <a class="btn-back" href="profile.html">← Back to Profile</a>
          </div>
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <div class="empty-title">${t('noOrders')}</div>
            <div class="empty-subtitle">${t('noOrdersSubtitle')}</div>
            <a class="btn-primary" href="shop.html">🛒 Start Shopping</a>
          </div>
        `;
        return;
      }

      // Calculate stats
      const totalSpent = orderHistory.reduce((sum, o) => sum + (o.total || 0), 0);
      const totalOrders = orderHistory.length;

      // Group by date
      const grouped = orderHistory.reduce((groups, order) => {
        const dateKey = new Date(order.date).toDateString();
        if (!groups[dateKey]) groups[dateKey] = [];
        groups[dateKey].push(order);
        return groups;
      }, {});

      const sortedEntries = Object.entries(grouped).sort(([a], [b]) => new Date(b) - new Date(a));

      let html = `
        <div class="page-title-bar">
          <h1>${t('orderHistory')}</h1>
          <a class="btn-back" href="profile.html">← Back to Profile</a>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-number">${totalOrders}</div>
            <div class="stat-label">${t('orders')}</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">KES ${totalSpent.toLocaleString()}</div>
            <div class="stat-label">${t('totalSpent')}</div>
          </div>
        </div>
      `;

      sortedEntries.forEach(([date, orders]) => {
        const dayTotal = orders.reduce((sum, o) => sum + (o.total || 0), 0);

        html += `
          <div class="order-group">
            <div class="order-group-header">
              <div class="order-date">📅 ${date}</div>
              <div class="order-day-total">KES ${dayTotal.toLocaleString()}</div>
            </div>
        `;

        orders.forEach(order => {
          // Group items by name
          const groupedItems = (order.items || []).reduce((acc, item) => {
            if (!acc[item.name]) acc[item.name] = { name: item.name, quantity: 0, price: item.price };
            acc[item.name].quantity += item.quantity;
            return acc;
          }, {});

          const orderTime = order.date ? new Date(order.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

          html += `
            <div class="order-item">
              <div class="order-item-header">
                <div class="order-id">${t('order')} #${order.id}</div>
                ${orderTime ? `<div class="order-time">${orderTime}</div>` : ''}
              </div>
              ${Object.values(groupedItems).map(item => `
                <div class="order-product-row">
                  <div class="product-info">
                    <span class="product-name">${item.name}</span>
                    <span class="product-qty">×${item.quantity}</span>
                  </div>
                  <div class="product-price">KES ${(item.price * item.quantity).toLocaleString()}</div>
                </div>
              `).join('')}
              <div class="order-total-row">
                <span class="order-total-label">Order Total:</span>
                <span class="order-total-amount">KES ${(order.total || 0).toLocaleString()}</span>
              </div>
            </div>
          `;
        });

        html += `</div>`;
      });

      html += `
        <div class="footer-actions">
          <a class="btn-primary" href="shop.html">🛒 Shop Again</a>
          <button class="btn-danger" onclick="clearOrderHistory()">🗑️ ${t('clearHistory')}</button>
        </div>
      `;

      content.innerHTML = html;
    }

    function clearOrderHistory() {
      if (confirm('Are you sure you want to clear your order history? This action cannot be undone.')) {
        const userEmail = localStorage.getItem('email');
        if (userEmail) {
          localStorage.removeItem('orderHistory_' + userEmail);
          showToast('Order history cleared.');
          initPage();
        }
      }
    }

    function showToast(message) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
